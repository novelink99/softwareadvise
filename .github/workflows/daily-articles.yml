name: Daily Article Generation

on:
  schedule:
    - cron: '0 1 * * *'   # 09:00 SGT (UTC+8)
    - cron: '0 13 * * *'  # 21:00 SGT (UTC+8)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x generate-article.sh
          ./generate-article.sh

      - name: Commit and push
        run: |
          git config user.name "SoftwareAdvise Bot"
          git config user.email "bot@softwareadvise.co"
          git add -A
          if git diff --staged --quiet; then
            echo "No new article generated — skipping commit."
          else
            git commit -m "Auto: new article $(date +%Y-%m-%d)"
            git push
          fi
